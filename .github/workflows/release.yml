name: Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'engine/**'
      - 'src/**'
      - 'scripts/**'
      - 'index.html'
      - 'package.json'
      - 'service.json'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build UI
      - name: Install UI dependencies
        run: npm install

      - name: Build UI
        run: npm run build

      # Prepare engine with prod dependencies
      - name: Install engine dependencies
        working-directory: engine
        run: npm install --omit=dev --package-lock=false

      # Generate version.json with auto-incrementing semantic version
      # Also stamp engine/package.json so PCC's "installed version" reading matches the release tag
      - name: Generate version.json
        id: version
        run: |
          MAJOR_MINOR=$(node -p "require('./engine/package.json').version.split('.').slice(0,2).join('.')")
          VERSION="${MAJOR_MINOR}.${{ github.run_number }}"
          echo "{\"version\":\"${VERSION}\",\"commit\":\"${{ github.sha }}\",\"commitShort\":\"${GITHUB_SHA::7}\",\"branch\":\"main\"}" > engine/version.json
          node -e "const fs=require('fs');const p='./engine/package.json';const j=JSON.parse(fs.readFileSync(p));j.version='${VERSION}';fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');"
          # Stamp root package.json too, so any tooling that reads it also sees the release version
          node -e "const fs=require('fs');const p='./package.json';if(fs.existsSync(p)){const j=JSON.parse(fs.readFileSync(p));j.version='${VERSION}';fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      # Ensure lifecycle scripts are executable in the release tarball
      - name: Prepare PCC scripts
        run: chmod +x scripts/*.sh

      # Package dist.tar.gz with Pi Control Center structure
      - name: Create tarball
        run: tar czf dist.tar.gz --exclude='engine/node_modules/sharp' engine/ dist/ scripts/ service.json package.json

      # Versioned release — PCC reads tag_name as the GitHub version
      - name: Create versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            Auto-built from ${{ github.sha }} at ${{ github.event.head_commit.timestamp }}

            **Pi Control Center kompatibel** — innehåller:
            - `engine/` — Sonos UPnP motor (Node.js)
            - `dist/` — Statiskt UI (React)
            - `scripts/` — Install/update/uninstall
          files: dist.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Also keep a moving "latest" alias so older clients still work
      - name: Delete existing 'latest' release
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create 'latest' alias release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build (${{ steps.version.outputs.tag }})
          body: |
            Alias for ${{ steps.version.outputs.tag }}.
          files: dist.tar.gz
          make_latest: 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
