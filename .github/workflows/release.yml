name: Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - 'engine/**'
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - 'tailwind.config.ts'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build UI
      - name: Install UI dependencies
        run: npm install

      - name: Build UI
        run: npm run build

      # Prepare engine with prod dependencies
      - name: Install engine dependencies
        working-directory: engine
        run: npm install --omit=dev --package-lock=false

      # Package dist.tar.gz with Pi Control Center structure
      - name: Create tarball
        run: tar czf dist.tar.gz engine/ dist/ scripts/

      - name: Delete existing 'latest' release
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Auto-built from ${{ github.sha }}
            
            **Pi Control Center kompatibel** — innehåller:
            - `engine/` — Sonos UPnP motor (Node.js)
            - `dist/` — Statiskt UI (React)
            - `scripts/` — Install/update/uninstall
          files: dist.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
