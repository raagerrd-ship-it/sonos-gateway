name: Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - 'engine/**'
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build UI
      - name: Install UI dependencies
        run: npm install

      - name: Build UI
        run: npm run build

      # Prepare engine with prod dependencies
      - name: Install engine dependencies
        working-directory: engine
        run: npm install --omit=dev --package-lock=false

      # Generate version.json with auto-incrementing semantic version
      - name: Generate version.json
        run: |
          MAJOR_MINOR=$(node -p "require('./engine/package.json').version.split('.').slice(0,2).join('.')")
          VERSION="${MAJOR_MINOR}.${{ github.run_number }}"
          echo "{\"version\":\"${VERSION}\",\"commit\":\"${{ github.sha }}\",\"commitShort\":\"${GITHUB_SHA::7}\",\"branch\":\"main\"}" > engine/version.json

      # Package dist.tar.gz with Pi Control Center structure
      - name: Create tarball
        run: tar czf dist.tar.gz --exclude='engine/node_modules/sharp' engine/ dist/ scripts/ service.json

      - name: Delete existing 'latest' release
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Auto-built from ${{ github.sha }} at ${{ github.event.head_commit.timestamp }}
            
            **Pi Control Center kompatibel** — innehåller:
            - `engine/` — Sonos UPnP motor (Node.js)
            - `dist/` — Statiskt UI (React)
            - `scripts/` — Install/update/uninstall
          files: dist.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
