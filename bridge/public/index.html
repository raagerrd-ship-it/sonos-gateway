<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonos Proxy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a; color: #e0e0e0; min-height: 100vh;
    }
    .container { max-width: 640px; margin: 0 auto; padding: 24px 16px; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; color: #fff; }
    .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 24px; }
    
    /* Now Playing */
    .now-playing {
      background: #161616; border-radius: 12px; padding: 16px;
      margin-bottom: 24px; border: 1px solid #222;
    }
    .now-playing-header { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .now-playing-content { display: flex; gap: 12px; align-items: center; }
    .now-playing-art {
      width: 64px; height: 64px; border-radius: 8px; background: #222;
      object-fit: cover; flex-shrink: 0;
    }
    .now-playing-art-placeholder {
      width: 64px; height: 64px; border-radius: 8px; background: #222;
      display: flex; align-items: center; justify-content: center; color: #444; font-size: 24px; flex-shrink: 0;
    }
    .now-playing-info { flex: 1; min-width: 0; }
    .now-playing-track { font-weight: 600; font-size: 0.95rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .now-playing-artist { color: #888; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .now-playing-state {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem;
      font-weight: 600; text-transform: uppercase; margin-top: 4px;
    }
    .state-playing { background: #1a3a1a; color: #4ade80; }
    .state-paused { background: #3a3a1a; color: #facc15; }
    .state-idle { background: #1a1a1a; color: #666; }
    
    /* Devices */
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .section-title { font-size: 0.85rem; font-weight: 600; color: #aaa; }
    .btn {
      padding: 6px 14px; border-radius: 6px; border: 1px solid #333;
      background: #1a1a1a; color: #ccc; font-size: 0.8rem; cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: #252525; border-color: #444; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-scanning { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    
    .device-list { display: flex; flex-direction: column; gap: 8px; }
    .device-card {
      background: #161616; border: 1px solid #222; border-radius: 10px;
      padding: 14px 16px; cursor: pointer; transition: all 0.15s;
      display: flex; justify-content: space-between; align-items: center;
    }
    .device-card:hover { border-color: #444; background: #1c1c1c; }
    .device-card.active { border-color: #4ade80; background: #0d1f0d; }
    .device-name { font-weight: 600; font-size: 0.9rem; color: #fff; }
    .device-meta { font-size: 0.75rem; color: #666; margin-top: 2px; }
    .device-badge {
      font-size: 0.65rem; padding: 2px 8px; border-radius: 4px;
      background: #1a3a1a; color: #4ade80; font-weight: 600;
    }
    
    .empty-state { text-align: center; padding: 32px; color: #555; font-size: 0.85rem; }
    .status-bar { margin-top: 24px; font-size: 0.7rem; color: #444; text-align: center; }
    
    /* Settings */
    .settings-toggle {
      background: none; border: none; color: #555; font-size: 1.2rem; cursor: pointer;
      padding: 4px 8px; border-radius: 6px; transition: all 0.15s;
    }
    .settings-toggle:hover { color: #aaa; background: #1a1a1a; }
    .settings-panel {
      background: #161616; border: 1px solid #222; border-radius: 12px;
      padding: 16px; margin-bottom: 24px; display: none;
    }
    .settings-panel.open { display: block; }
    .settings-panel h3 { font-size: 0.85rem; font-weight: 600; color: #aaa; margin-bottom: 12px; }
    .setting-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #1a1a1a;
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 0.85rem; color: #ccc; }
    .setting-desc { font-size: 0.7rem; color: #555; margin-top: 2px; }
    .setting-input {
      width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #333;
      background: #0a0a0a; color: #ccc; font-size: 0.85rem; margin-top: 8px;
      font-family: monospace;
    }
    .setting-input:focus { outline: none; border-color: #555; }
    .toggle-switch {
      position: relative; width: 44px; height: 24px; cursor: pointer; flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0; background: #333; border-radius: 12px; transition: 0.2s;
    }
    .toggle-slider:before {
      content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px;
      background: #888; border-radius: 50%; transition: 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: #1a3a1a; }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(20px); background: #4ade80; }
    .settings-save {
      margin-top: 12px; width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #333;
      background: #1a1a1a; color: #ccc; font-size: 0.85rem; cursor: pointer; transition: all 0.15s;
    }
    .settings-save:hover { background: #252525; border-color: #4ade80; color: #fff; }
    .settings-save:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
      <h1>🔊 Sonos Proxy</h1>
      <button class="settings-toggle" onclick="toggleSettings()" title="Inställningar">⚙️</button>
    </div>
    <p class="subtitle">Välj aktiv Sonos-högtalare</p>
    
    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
      <h3>☁️ Cloud Push</h3>
      <div class="setting-row">
        <div>
          <div class="setting-label">Skicka till databas</div>
          <div class="setting-desc">Pusha speldata till Brew Monitor TV</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="cloudEnabled" onchange="markSettingsDirty()">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div id="cloudFields">
        <div style="padding-top:8px;">
          <div class="setting-label">Endpoint URL</div>
          <input class="setting-input" id="cloudUrl" type="url" placeholder="https://..." oninput="markSettingsDirty()">
        </div>
        <div style="padding-top:8px;">
          <div class="setting-label">Secret / API-nyckel</div>
          <input class="setting-input" id="cloudSecret" type="password" placeholder="Hemlig nyckel" oninput="markSettingsDirty()">
        </div>
        <div style="padding-top:8px;">
          <div class="setting-label">Push-intervall (ms)</div>
          <input class="setting-input" id="cloudInterval" type="number" min="100" step="100" placeholder="1000" oninput="markSettingsDirty()">
        </div>
      </div>
      <button class="settings-save" id="saveCloudBtn" onclick="saveCloudConfig()" disabled>Spara</button>
    </div>
    
    <!-- Now Playing -->
    <div class="now-playing" id="nowPlaying">
      <div class="now-playing-header">Nu spelas</div>
      <div class="now-playing-content" id="nowPlayingContent">
        <div class="now-playing-art-placeholder">♪</div>
        <div class="now-playing-info">
          <div class="now-playing-track" style="color:#555">Ingen uppspelning</div>
          <div class="now-playing-artist">—</div>
        </div>
      </div>
      <!-- Next Track -->
      <div id="nextTrack" style="display:none; margin-top:12px; padding-top:10px; border-top:1px solid #222;">
        <div style="font-size:0.65rem; color:#555; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px;">Nästa</div>
        <div style="display:flex; gap:10px; align-items:center;" id="nextTrackContent"></div>
      </div>
    </div>
    
    <!-- Devices -->
    <div class="section-header">
      <span class="section-title">Enheter på nätverket</span>
      <div style="display:flex;gap:8px;">
        <button class="btn" id="updateBtn" onclick="updateService()">⬆ Uppdatera</button>
        <button class="btn" id="scanBtn" onclick="scanDevices()">Skanna</button>
      </div>
    </div>
    <div class="device-list" id="deviceList">
      <div class="empty-state">Klicka "Skanna" för att hitta Sonos-enheter</div>
    </div>
    
    <div class="status-bar" id="statusBar">—</div>
  </div>
  
  <script>
    let currentUuid = null;
    let currentIp = null;
    let eventSource = null;
    
    async function loadConfig() {
      try {
        const res = await fetch('/api/sonos/config');
        const data = await res.json();
        if (data.ok) {
          currentUuid = data.sonosUuid;
          currentIp = data.currentIp;
          const name = data.sonosName || data.currentIp || '—';
          document.getElementById('statusBar').textContent = `Aktiv: ${name}`;
          // Show cached devices immediately
          if (data.knownDevices && data.knownDevices.length > 0) {
            renderDevices(data.knownDevices);
          }
        }
      } catch (e) {}
    }
    
    async function scanDevices() {
      const btn = document.getElementById('scanBtn');
      btn.disabled = true;
      btn.textContent = 'Skannar...';
      btn.classList.add('btn-scanning');
      
      try {
        const res = await fetch('/api/sonos/discover');
        const data = await res.json();
        currentUuid = data.currentUuid;
        currentIp = data.currentIp;
        renderDevices(data.devices || []);
      } catch (e) {
        document.getElementById('deviceList').innerHTML = '<div class="empty-state">Skanningen misslyckades</div>';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Skanna';
        btn.classList.remove('btn-scanning');
      }
    }
    
    function renderDevices(devices) {
      const list = document.getElementById('deviceList');
      if (devices.length === 0) {
        list.innerHTML = '<div class="empty-state">Inga Sonos-enheter hittades</div>';
        return;
      }
      
      list.innerHTML = devices.map(d => {
        const isActive = (currentUuid && d.uuid === currentUuid) || (!currentUuid && d.ip === currentIp);
        return `
          <div class="device-card ${isActive ? 'active' : ''}" onclick="selectDevice('${d.ip}', '${(d.name || '').replace(/'/g, "\\'")}', '${d.uuid || ''}')">
            <div>
              <div class="device-name">${d.name || 'Okänd'}</div>
              <div class="device-meta">${d.ip} · ${d.model || 'Sonos'}${d.uuid ? ' · ' + d.uuid.substring(0, 8) : ''}</div>
            </div>
            ${isActive ? '<span class="device-badge">AKTIV</span>' : ''}
          </div>
        `;
      }).join('');
    }
    
    async function selectDevice(ip, name, uuid) {
      if (uuid && uuid === currentUuid) return;
      if (!uuid && ip === currentIp) return;
      try {
        const res = await fetch('/api/sonos/config', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sonosIp: ip, sonosName: name, sonosUuid: uuid })
        });
        const data = await res.json();
        if (data.ok) {
          currentIp = ip;
          currentUuid = uuid || null;
          document.getElementById('statusBar').textContent = `Bytte till: ${name || ip}`;
          // Re-render
          // Re-fetch and re-render to ensure correct active state
          try {
            const cfgRes = await fetch('/api/sonos/config');
            const cfgData = await cfgRes.json();
            if (cfgData.ok && cfgData.knownDevices) {
              renderDevices(cfgData.knownDevices);
            }
          } catch (e) {
            // Fallback: just re-scan
            scanDevices();
          }
          connectSSE();
        }
      } catch (e) {
        document.getElementById('statusBar').textContent = 'Fel vid byte av enhet';
      }
    }
    
    function connectSSE() {
      if (eventSource) { eventSource.close(); }
      eventSource = new EventSource('/api/sonos/events');
      eventSource.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          // Only update if we actually have meaningful data
          if (data && (data.trackName || data.playbackState)) {
            updateNowPlaying(data);
          }
        } catch (err) {}
      };
      eventSource.onerror = () => {
        // Reconnect after 3s on error
        eventSource.close();
        setTimeout(connectSSE, 3000);
      };
    }
    
    function updateNowPlaying(data) {
      const container = document.getElementById('nowPlayingContent');
      const isPlaying = data.playbackState === 'PLAYBACK_STATE_PLAYING';
      const isPaused = data.playbackState === 'PLAYBACK_STATE_PAUSED';
      const hasTrack = data.trackName;
      
      if (!hasTrack && !isPlaying && !isPaused) {
        container.innerHTML = `
          <div class="now-playing-art-placeholder">♪</div>
          <div class="now-playing-info">
            <div class="now-playing-track" style="color:#555">Ingen uppspelning</div>
            <div class="now-playing-artist">—</div>
          </div>
        `;
        return;
      }
      
      const stateClass = isPlaying ? 'state-playing' : isPaused ? 'state-paused' : 'state-idle';
      const stateText = isPlaying ? 'Spelar' : isPaused ? 'Pausad' : 'Stoppad';
      
      const artHtml = data.albumArtUri
        ? `<img class="now-playing-art" src="${data.albumArtUri}" onerror="this.outerHTML='<div class=\\'now-playing-art-placeholder\\'>♪</div>'">`
        : '<div class="now-playing-art-placeholder">♪</div>';
      
      container.innerHTML = `
        ${artHtml}
        <div class="now-playing-info">
          <div class="now-playing-track">${data.trackName || 'Okänd'}</div>
          <div class="now-playing-artist">${data.artistName || '—'}${data.albumName ? ' · ' + data.albumName : ''}</div>
          <span class="now-playing-state ${stateClass}">${stateText}</span>
        </div>
      `;
      
      // Next track
      const nextEl = document.getElementById('nextTrack');
      const nextContent = document.getElementById('nextTrackContent');
      if (data.nextTrackName) {
        const nextArt = data.nextAlbumArtUri
          ? `<img style="width:40px;height:40px;border-radius:6px;object-fit:cover;flex-shrink:0;" src="${data.nextAlbumArtUri}" onerror="this.outerHTML='<div style=\\'width:40px;height:40px;border-radius:6px;background:#222;display:flex;align-items:center;justify-content:center;color:#444;font-size:16px;flex-shrink:0\\'>♪</div>'">`
          : '<div style="width:40px;height:40px;border-radius:6px;background:#222;display:flex;align-items:center;justify-content:center;color:#444;font-size:16px;flex-shrink:0;">♪</div>';
        nextContent.innerHTML = `
          ${nextArt}
          <div style="min-width:0;">
            <div style="font-size:0.8rem;font-weight:600;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${data.nextTrackName}</div>
            <div style="font-size:0.7rem;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${data.nextArtistName || '—'}</div>
          </div>
        `;
        nextEl.style.display = 'block';
      } else {
        nextEl.style.display = 'none';
      }
    }
    
    async function updateService() {
      const btn = document.getElementById('updateBtn');
      btn.disabled = true;
      btn.textContent = '⬆ Uppdaterar...';
      btn.classList.add('btn-scanning');
      const status = document.getElementById('statusBar');
      try {
        const res = await fetch('/api/sonos/update', { method: 'POST' });
        const data = await res.json();
        if (data.ok && data.updated) {
          status.textContent = '✅ Uppdaterad! Startar om tjänsten...';
          // Service will restart, page will reconnect
          setTimeout(() => location.reload(), 3000);
        } else if (data.ok) {
          status.textContent = '✅ Redan senaste versionen';
          btn.disabled = false;
          btn.textContent = '⬆ Uppdatera';
          btn.classList.remove('btn-scanning');
        } else {
          status.textContent = '❌ ' + (data.error || 'Uppdatering misslyckades');
          btn.disabled = false;
          btn.textContent = '⬆ Uppdatera';
          btn.classList.remove('btn-scanning');
        }
      } catch (e) {
        status.textContent = '❌ Kunde inte nå servern';
        btn.disabled = false;
        btn.textContent = '⬆ Uppdatera';
        btn.classList.remove('btn-scanning');
      }
    }

    // Fetch initial status immediately, then connect SSE for updates
    async function init() {
      await loadConfig();
      try {
        const res = await fetch('/api/sonos/status');
        const data = await res.json();
        if (data && (data.trackName || data.playbackState)) {
          updateNowPlaying(data);
        }
      } catch (e) {}
      connectSSE();
    }
    init();
  </script>
</body>
</html>
